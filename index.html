// Tiny Lucide icon helper — renders an SVG by name from the lucide global
const Icon = ({ name, size = 16, className = "", style = {}, fill = "none", stroke = "currentColor" }) => {
  const node = lucide.icons[name];
  if (!node) return null;
  // node = [tag, attrs, [ [childTag, childAttrs], ... ]]
  const [, , children] = node;
  return (
    <svg
      xmlns="http://www.w3.org/2000/svg"
      width={size}
      height={size}
      viewBox="0 0 24 24"
      fill={fill}
      stroke={stroke}
      strokeWidth="2"
      strokeLinecap="round"
      strokeLinejoin="round"
      className={className}
      style={style}
    >
      {children.map((c, i) => {
        const [tag, attrs] = c;
        return React.createElement(tag, { key: i, ...attrs });
      })}
    </svg>
  );
};

const SCREENS = [
  { id: "home", label: "1 · Homepage", group: "site" },

  { id: "used", label: "3 · Browse Used", group: "site" },

  { id: "crm", label: "7 · CRM Dashboard", group: "crm" },
  { id: "crm-upload", label: "8 · Add Product", group: "crm" },
];

function App() {
  const [screen, setScreen] = useState("home");

  return (
    <div style={{ fontFamily: "'Archivo', ui-sans-serif, system-ui" }}>
      <div className="screen-picker sticky top-0 z-50 bg-white/95 backdrop-blur border-b shadow-sm" style={{ borderColor: RULE }}>

          {SCREENS.filter(s => s.group === "site").map(s => (
            <button
              key={s.id}
              onClick={() => go(s.id)}
              className={`shrink-0 px-3 py-1.5 text-[11px] font-bold tracking-wider uppercase whitespace-nowrap ${screen === s.id ? "bg-black text-white" : "border hover:bg-stone-100"}`}

            >

            </button>
          ))}
          <span className="text-[10px] tracking-[0.18em] uppercase font-bold shrink-0 ml-3" style={{ color: BRAND_RED }}>CRM →</span>

      {screen === "new" && <CategoryScreen go={go} mode="new" />}

      {screen === "product" && <ProductScreen go={go} />}

}
